<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IoT Swarm Mesh</title>
    <base href="/" />
    <link rel="stylesheet" href="app.css" />
    <link rel="stylesheet" href="WebApp.Client.styles.css" />
</head>

<body>
    <div id="app">
        <svg class="loading-progress">
            <circle r="40%" cx="50%" cy="50%" />
            <circle r="40%" cx="50%" cy="50%" />
        </svg>
        <div class="loading-progress-text"></div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="." class="reload">Reload</a>
        <span class="dismiss">&#x1F5D9;</span>
    </div>
    <script src="_framework/blazor.webassembly.js"></script>
    <script>
        // Triggers a browser file download from a string (used for JSON export).
        window.downloadTextFile = function (filename, content) {
            const a = document.createElement('a');
            a.href = URL.createObjectURL(new Blob([content], { type: 'application/json' }));
            a.download = filename;
            a.click();
            URL.revokeObjectURL(a.href);
        };
    </script>
</body>

</html>
